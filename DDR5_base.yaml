Frontend:
  impl: LoadStoreTrace
  path: ./test.trace
  clock_ratio: 1

  Translation:
    impl: NoTranslation
    max_addr: 68719476736

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 3

  DRAM:
    impl: DDR5
    org:
      preset: DDR5_64Gb_x16
      channel: 1
      rank: 4
    timing:
      preset: DDR5_3200AN 
    RFM:
      BRC: 2

  Controller:
    impl: Generic
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh